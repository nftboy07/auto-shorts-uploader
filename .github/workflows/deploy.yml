name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare encoded secrets
        id: encode
        run: |
          # Base64 encode cookies so SSH transfer preserves tabs/newlines
          COOKIES_B64=$(printf '%s' '${{ secrets.INSTAGRAM_COOKIES }}' | base64 -w 0)
          echo "cookies_b64=$COOKIES_B64" >> $GITHUB_OUTPUT

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          envs: COOKIES_B64,YT_CREDS,TG_TOKEN,IG_USER,IG_PASS,GEMINI_KEY
          script: |
            # Create deployment directory if it doesn't exist
            if [ ! -d "/opt/instagram-youtube-shorts-agent" ]; then
              echo "Folder not found. Creating and cloning..."
              mkdir -p /opt/instagram-youtube-shorts-agent
              git clone https://github.com/${{ github.repository }}.git /opt/instagram-youtube-shorts-agent
            fi

            cd /opt/instagram-youtube-shorts-agent

            # Reset any local changes and pull the latest code from main
            git fetch --all
            git reset --hard origin/main

            # Write .env file
            printf 'TELEGRAM_BOT_TOKEN=%s\nINSTAGRAM_USERNAME=%s\nINSTAGRAM_PASSWORD=%s\nGEMINI_API_KEY=%s\n' \
              "$TG_TOKEN" "$IG_USER" "$IG_PASS" "$GEMINI_KEY" > .env
            echo ".env written"

            # Write YouTube OAuth credentials
            mkdir -p config
            if [ -n "$YT_CREDS" ]; then
              printf '%s' "$YT_CREDS" > config/youtube_credentials.json
              echo "YouTube credentials written ($(wc -c < config/youtube_credentials.json) bytes)"
            else
              echo "WARNING: YT_CREDS not set - YouTube uploads will fail"
            fi

            # Decode and write Instagram cookies (base64 preserved tabs/newlines)
            if [ -n "$COOKIES_B64" ]; then
              printf '%s' "$COOKIES_B64" | base64 -d > config/instagram_cookies.txt
              echo "Instagram cookies written ($(wc -c < config/instagram_cookies.txt) bytes)"
              # Verify cookies contain sessionid
              if grep -q "sessionid" config/instagram_cookies.txt; then
                echo "Cookie validation: sessionid found OK"
              else
                echo "WARNING: cookies may be invalid (no sessionid found)"
              fi
            else
              echo "WARNING: COOKIES_B64 not set - yt-dlp will run unauthenticated"
            fi

            # Rebuild and restart the container
            docker compose up --build -d

            # Verify bot is running
            sleep 8
            if docker ps | grep -q shortsbot-agent; then
              echo "Bot container is running!"
            else
              echo "Bot container failed to start - logs:"
              docker compose logs --tail=40
              exit 1
            fi

            echo "Deployment completed successfully!"
        env:
          COOKIES_B64: ${{ steps.encode.outputs.cookies_b64 }}
          YT_CREDS: ${{ secrets.YOUTUBE_CREDENTIALS_JSON }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          IG_USER: ${{ secrets.INSTAGRAM_USERNAME }}
          IG_PASS: ${{ secrets.INSTAGRAM_PASSWORD }}
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
