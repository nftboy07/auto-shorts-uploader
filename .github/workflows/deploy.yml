name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script: |
            # Create deployment directory if it doesn't exist
            if [ ! -d "/opt/instagram-youtube-shorts-agent" ]; then
              echo "Folder not found. Creating and cloning..."
              sudo mkdir -p /opt/instagram-youtube-shorts-agent
              sudo chown -R $USER:$USER /opt/instagram-youtube-shorts-agent
              git clone https://github.com/${{ github.repository }}.git /opt/instagram-youtube-shorts-agent
            fi

            cd /opt/instagram-youtube-shorts-agent
            
            # Reset any local changes and pull the latest code from main
            git fetch --all
            git reset --hard origin/main
            
            # Write environment variables from GitHub Secrets to VPS .env
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
            echo "INSTAGRAM_USERNAME=${{ secrets.INSTAGRAM_USERNAME }}" >> .env
            echo "INSTAGRAM_PASSWORD=${{ secrets.INSTAGRAM_PASSWORD }}" >> .env
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
            # Rebuild and restart the container
            docker compose down
            docker compose up --build -d
            
            echo "🚀 Deployment completed successfully!"
