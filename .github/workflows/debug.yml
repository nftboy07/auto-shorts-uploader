name: Debug VPS Logs

on:
  push:
    branches:
      - debug-vps
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Diagnostics on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script: |
            cd /opt/instagram-youtube-shorts-agent || true
            
            echo "=== WRITING AND RUNNING INSTALOADER LOGIN TEST VIA DOCKER CP ==="
            cat << 'LOGINEOF' > vps_test_login.py
            import os
            import instaloader
            
            username = os.environ.get("INSTAGRAM_USERNAME", "rashaaeeyyy")
            password = os.environ.get("INSTAGRAM_PASSWORD", "ILOVEeng10@")
            
            print(f"Username from env: {username}")
            print(f"Password from env length: {len(password) if password else 0}")
            
            loader = instaloader.Instaloader(
                download_pictures=False,
                download_videos=False,
                download_video_thumbnails=False,
                download_geotags=False,
                download_comments=False,
                save_metadata=False
            )
            
            try:
                print("Attempting login...")
                loader.login(username, password)
                print("SUCCESS: Logged in successfully!")
                
                # Print cookies
                session = loader.context._session
                print("Session cookies:")
                for c in session.cookies:
                    print(f"  {c.name}: {c.value[:10]}...")
            except instaloader.TwoFactorAuthRequiredException:
                print("FAILED: 2FA Required!")
            except Exception as e:
                print(f"FAILED: Login failed: {e}")
            LOGINEOF
            
            # Copy to container
            CONTAINER_ID=$(docker ps -q -f name=shortsbot-agent)
            echo "Container ID: $CONTAINER_ID"
            docker cp vps_test_login.py $CONTAINER_ID:/app/vps_test_login.py || true
            
            # Run inside container
            docker compose exec -T shortsbot python /app/vps_test_login.py || true
            
            # Clean up
            docker compose exec -T shortsbot rm /app/vps_test_login.py || true
            rm vps_test_login.py || true
