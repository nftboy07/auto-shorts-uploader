name: Debug VPS Logs

on:
  push:
    branches:
      - debug-vps
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Diagnostics on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script: |
            cd /opt/instagram-youtube-shorts-agent || true
            
            echo "=== TESTING INSTALOADER SESSION VALIDITY ==="
            docker exec shortsbot-agent python -c "
            import instaloader
            import os
            
            loader = instaloader.Instaloader()
            try:
                # Load session from file
                # Instaloader expects session file in standard directory or we can load it from file directly
                # Wait, save_session_to_file saves it to the path, we can load it using load_session_from_file
                username = 'rashaaeeyyy'
                session_path = '/app/config/session_' + username
                if os.path.exists(session_path):
                    loader.load_session_from_file(username, session_path)
                    print('Successfully loaded session from:', session_path)
                    
                    # Test getting profile info using this session
                    profile = instaloader.Profile.from_username(loader.context, 'noryx.amv')
                    print('Profile fetched successfully!')
                    print('Username:', profile.username)
                    print('User ID:', profile.userid)
                    print('Followers:', profile.followers)
                else:
                    print('Session file does not exist at:', session_path)
            except Exception as e:
                print('Instaloader session test failed:', e)
            " || true
