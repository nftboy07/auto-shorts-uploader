name: Debug VPS Logs

on:
  push:
    branches:
      - debug-vps
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Diagnostics on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script: |
            cd /opt/instagram-youtube-shorts-agent || true
            
            echo "=== RUNNING INSTALOADER ANONYMOUS PROFILE TEST ==="
            cat << 'ANONEOF' > vps_test_anon.py
            import instaloader
            
            username = "noryx.amv"
            loader = instaloader.Instaloader(
                download_pictures=False,
                download_videos=False,
                download_video_thumbnails=False,
                download_geotags=False,
                download_comments=False,
                save_metadata=False
            )
            
            try:
                print(f"Fetching profile {username} anonymously...")
                profile = instaloader.Profile.from_username(loader.context, username)
                print(f"Profile User ID: {profile.userid}")
                print(f"Is Private: {profile.is_private}")
                print("Latest posts:")
                count = 0
                for post in profile.get_posts():
                    print(f"  Post {post.shortcode}: is_video={post.is_video}, url={post.video_url if post.is_video else 'None'}")
                    count += 1
                    if count >= 5:
                        break
            except Exception as e:
                print(f"Failed anonymously: {e}")
            ANONEOF
            
            CONTAINER_ID=$(docker ps -q -f name=shortsbot-agent)
            docker cp vps_test_anon.py $CONTAINER_ID:/app/vps_test_anon.py || true
            
            # Run inside container
            docker compose exec -T shortsbot python /app/vps_test_anon.py || true
            
            # Clean up
            docker compose exec -T shortsbot rm /app/vps_test_anon.py || true
            rm vps_test_anon.py || true
