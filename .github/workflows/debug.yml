name: Debug VPS Logs

on:
  push:
    branches:
      - debug-vps
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Diagnostics on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script: |
            cd /opt/instagram-youtube-shorts-agent || true
            
            echo "=== VPS CONTAINER STATUS ==="
            docker ps -a || true
            
            echo "=== SHORTSBOT BOT CONTAINER LOGS ==="
            docker compose logs --tail=100 shortsbot || true
