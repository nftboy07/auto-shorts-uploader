# Instagram Watcher Settings
instagram:
  accounts: []
  check_interval_seconds: 1800
  download_dir: "downloads"
  min_duration: 20
  max_duration: 60
  min_height: 720

# YouTube Upload Settings
youtube:
  category_id: "24"  # Entertainment
  privacy_status: "public"
  min_uploads_per_day: 8
  max_uploads_per_day: 20
  randomize_uploads: true

# Telegram Settings
telegram:
  allowed_admins: []  # Telegram user IDs

# Proxy Settings
proxy:
  enable_rotation: false
